async function login() {
    const serial = document.getElementById('serial').value;
    const pw = document.getElementById('pw').value;
    const isRemember = document.getElementById('remember-me').checked; // 取得勾選狀態
    
    const { data } = await _supabase.from('user_credentials').select('*').eq('serial_number', serial).eq('password', pw).single();
    
    if (data) {
        // --- 新增：處理記住密碼邏輯 ---
        if (isRemember) {
            localStorage.setItem('saved_serial', serial);
            localStorage.setItem('saved_pw', pw);
            localStorage.setItem('remember_me', 'true');
        } else {
            // 如果沒勾選，就清除儲存的資訊
            localStorage.removeItem('saved_serial');
            localStorage.removeItem('saved_pw');
            localStorage.setItem('remember_me', 'false');
        }

        currentSerial = serial;
        document.getElementById('login-overlay').classList.add('hidden');
        
        if (!data.nickname) document.getElementById('nickname-overlay').classList.remove('hidden');
        else initApp(data.nickname, data.ai_name);

        if (liff.isInClient() && !data.line_user_id) {
            setTimeout(() => {
                document.getElementById('line-binding-overlay').classList.remove('hidden');
            }, 1000);
        }
    } else {
        alert("驗證失敗 😅");
    }
}


// 執行綁定動作
async function bindLineAccount() {
    try {
        // 取得 LINE Profile (包含 userId)
        const profile = await liff.getProfile();
        const lineUserId = profile.userId;

        // 更新 Supabase 資料表
        const { error } = await _supabase
            .from('user_credentials')
            .update({ line_user_id: lineUserId })
            .eq('serial_number', currentSerial);

        if (!error) {
            alert("✅ LINE 帳號綁定成功！");
            document.getElementById('line-binding-overlay').classList.add('hidden');
        } else {
            console.error("Supabase 更新失敗:", error);
            alert("綁定時發生錯誤，請稍後再試。");
        }
    } catch (err) {
        console.error("取得 LINE Profile 失敗:", err);
        alert("無法取得 LINE 資訊，請確保在 LINE App 中開啟。");
    }
}

// 1. 日期判斷工具
function getTargetDate(msg) {
    const today = new Date();
    // 判斷特定日期格式 YYYY/MM/DD 或 YYYY-MM-DD
    const dateMatch = msg.match(/(\d{4})[/-](\d{1,2})[/-](\d{1,2})/) || msg.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
    if (dateMatch) {
        return `${dateMatch[1]}-${dateMatch[2].padStart(2, '0')}-${dateMatch[3].padStart(2, '0')}`;
    }

    if (msg.includes("前天")) {
        today.setDate(today.getDate() - 2);
    } else if (msg.includes("昨天") || msg.includes("昨日")) {
        today.setDate(today.getDate() - 1);
    } else if (msg.includes("今天") || msg.includes("今日")) {
        // 保持今天
    } else {
return getLocalDateString(); // <-- 修改這裡，不要用 ISOString
    }
    
    // 將計算後的日期轉為本地格式字串
    const y = today.getFullYear();
    const m = String(today.getMonth() + 1).padStart(2, '0');
    const d = String(today.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
}

// 2. 處理健康指標的核心函式 (優化比對與建議邏輯)
async function processHealthKeyword(config, targetDateStr, isDefinitionQuery) {
    document.querySelector('.date-actions')?.remove();
    try {
        // --- 處理百科定義查詢 ---
        if (isDefinitionQuery) {
            const { data } = await _supabase.from('phrase_library').select('detailed_content').eq('title', config.fallbackTitle).limit(1).maybeSingle();
            await appendAiMessage(data?.detailed_content || `目前沒有關於 ${config.fallbackTitle} 的詳細百科資料。`);
            await new Promise(r => setTimeout(r, 800));
            await appendAiMessage(getRandomEndQuestion());
            return;
        }

        // --- 準備資料抓取 ---
        const targetDate = new Date(targetDateStr);
        const prevDate = new Date(targetDate);
        prevDate.setDate(prevDate.getDate() - 1);
        const prevDateStr = `${prevDate.getFullYear()}-${String(prevDate.getMonth() + 1).padStart(2, '0')}-${String(prevDate.getDate()).padStart(2, '0')}`;

        const { data: records, error } = await _supabase.from('health_data')
            .select('record_date, raw_json')
            .eq('serial_number', currentSerial)
            .in('record_date', [targetDateStr, prevDateStr]);

        if (error) throw error;
        const targetData = records?.find(r => r.record_date === targetDateStr);
        const prevData = records?.find(r => r.record_date === prevDateStr);

        // --- 無資料處理 ---
        if (!targetData) {
            await appendAiMessage("這天沒數據喔~ 😅 可能是沒有上傳，或資料尚未同步完成。 ☁️");
            await new Promise(r => setTimeout(r, 800));
            await appendAiMessage(getRandomEndQuestion());
            return;
        }

        const raw = targetData.raw_json;
        const prevRaw = prevData?.raw_json;
        let displayValStr = "";
        let logicStatus = ""; // 用於決定抓取哪種建議 (佳/差/平...)
        let rangeHint = "";   // 範圍提示文字

        // --- 根據不同指標執行特定判斷邏輯 ---
        const val = raw[config.displayField];

        switch(config.prefix) {
            case '生理電量':
                displayValStr = `**${val}**`;
                if (prevRaw && prevRaw.Personal_Battery_weighted_round !== undefined) {
                    logicStatus = (val > prevRaw.Personal_Battery_weighted_round) ? "佳" : "差";
                }
                break;

            case '睡眠效率':
                displayValStr = `**${val}${config.unit}**`;
                rangeHint = "（良好：≥ 85%，不佳：≤ 75%）";
                if (val >= 85) logicStatus = "佳";
                else if (val <= 75) logicStatus = "差";
                else logicStatus = "平";
                break;

            case '淺睡':
                displayValStr = `**${val}${config.unit}**`;
                rangeHint = "（標準參考範圍：50%~65%）";
                if (val > 65) logicStatus = "過多";
                else if (val < 50) logicStatus = "過少";
                else logicStatus = "佳";
                break;

            case '快速動眼':
                displayValStr = `**${val}${config.unit}**`;
                rangeHint = "（標準參考範圍：10%~25%）";
                if (val > 25) logicStatus = "過多";
                else if (val < 10) logicStatus = "過少";
                else logicStatus = "佳";
                break;

            case '血氧':
                displayValStr = `**${val}${config.unit}**`;
                rangeHint = "（標準參考範圍：> 95%）";
                logicStatus = (val > 95) ? "佳" : "差";
                break;

            case 'ODI':
                displayValStr = `**ODI 3%: ${raw.ODI3_total}, ODI 4%: ${raw.ODI4_total}** ${config.unit}`;
                rangeHint = "（標準參考範圍：每小時 < 5次）";
                logicStatus = (raw.ODI3_total >= 5 || raw.ODI4_total >= 5) ? "差" : "佳";
                break;

            case 'T88':
                displayValStr = `**T90: ${raw.T90_pct}%, T89: ${raw.T89_pct}%, T88: ${raw.T88_pct}%**`;
                rangeHint = "（標準參考範圍：T90 ≤ 5%、T89 ≤ 4%、T88 ≤ 3%）";
                logicStatus = (raw.T90_pct > 5 || raw.T89_pct > 4 || raw.T88_pct > 3) ? "差" : "佳";
                break;

            case '呼吸':
                displayValStr = `**${val}${config.unit}**`;
                rangeHint = "（標準參考範圍：12-25 rpm）";
                if (val > 25) logicStatus = "快";
                else if (val < 12) logicStatus = "慢";
                else logicStatus = "佳";
                break;

            case '脈搏':
                displayValStr = `**${val}${config.unit}**`;
                rangeHint = "（標準參考範圍：60-100 bpm）";
                if (val < 60) logicStatus = "低";
                else if (val > 100) logicStatus = "高";
                else logicStatus = "佳";
                break;

            default: 
                // 處理原本的 N3, rMSSD, HBI, 總睡眠
                displayValStr = config.displayField === 'TST_min' ? `**${Math.floor(val/60)}小時${val%60}分鐘**` : `**${val}${config.unit}**`;
                if (prevRaw && prevRaw[config.displayField] !== undefined) {
                    const prevVal = prevRaw[config.displayField];
                    logicStatus = config.inverse ? (val > prevVal ? "最差" : "最佳") : (val < prevVal ? "最差" : "最佳");
                }
        }

        // 優先使用 displayLabel，若無則使用 fallbackTitle
const label = config.displayLabel || config.fallbackTitle;
let finalContent = `📊 **${targetDateStr.replace(/-/g,'/')}** 的 ${label} 為：${displayValStr}`;
        if (rangeHint) finalContent += `<br><small style="color:#666">${rangeHint}</small>`;

        if (logicStatus) {
            const randomNum = Math.floor(Math.random() * 3) + 1;
            const targetLogicKey = `${config.prefix}${logicStatus}${randomNum}`;
            
            const { data: phraseData } = await _supabase.from('phrase_library')
                .select('detailed_content')
                .eq('logic_key', targetLogicKey)
                .limit(1).maybeSingle();
            
            if (phraseData) finalContent += `<br><br>${phraseData.detailed_content}`;
        }

        await appendAiMessage(finalContent);
        await new Promise(r => setTimeout(r, 800));
        await appendAiMessage(getRandomEndQuestion());

    } catch (err) {
        console.error("Query Error:", err);
        await appendAiMessage("查詢時發生一點小狀況，請稍後再試。");
    }
}

    // --- 核心邏輯：摘要比較與建議 (修正版) ---


async function fetchSummaryData(targetDate) {
    // 1. 獲取個人當前與前兩筆數據（包含目標日期與前一筆）
    const { data: healths } = await _supabase.from('health_data')
        .select('record_date, raw_json')
        .eq('serial_number', currentSerial)
        .lte('record_date', targetDate) // 依然維持 lte，因為需要抓取「前一天」來做增減比較
        .order('record_date', { ascending: false })
        .limit(2);

    if (!healths?.length) return null;// 【修正重點】：如果沒有數據，或是搜尋到的第一筆日期不等於使用者輸入的目標日期
    // 這代表「目標日期當天」沒有數據，直接回傳 null
    if (!healths?.length || healths[0].record_date !== targetDate) return null;

   const current = healths[0];
    const raw = current.raw_json;
    const currentBattery = raw.Personal_Battery_weighted_round || 0;

    // --- 2. 新增：計算百分比排名邏輯 (整合自 n12) ---
    const { data: allUsersData } = await _supabase.from('health_data')
        .select('raw_json')
        .eq('record_date', current.record_date);

    let percentage = 0;
    if (allUsersData && allUsersData.length > 0) {
        const totalUsers = allUsersData.length;
        // 計算有多少人的生理電量低於目前使用者
        const lowerUsers = allUsersData.filter(d => 
            (d.raw_json.Personal_Battery_weighted_round || 0) < currentBattery
        ).length;
        percentage = Math.round((lowerUsers / totalUsers) * 100);
    }
    // --------------------------------------------

    // 3. 指標增減比較邏輯
    let bestKey = COMPARISON_FIELDS[0], worstKey = COMPARISON_FIELDS[0];
    if (healths[1]) {
        let maxInc = -Infinity, maxDec = Infinity;
        COMPARISON_FIELDS.forEach(k => {
            const diff = (raw[k] || 0) - (healths[1].raw_json[k] || 0);
            if (diff > maxInc) { maxInc = diff; bestKey = k; }
            if (diff < maxDec) { maxDec = diff; worstKey = k; }
        });
    }

    // 4. 從資料庫獲取建議文字與狀態燈號
    const randomIdx = Math.floor(Math.random() * 3) + 1;
    const logicKeys = [`${FIELD_CONFIG[bestKey]}最佳`, `${FIELD_CONFIG[worstKey]}最差`, `${FIELD_CONFIG[worstKey]}最差${randomIdx}`];
    
    const { data: phrases } = await _supabase.from('phrase_library')
        .select('logic_key, detailed_content')
        .in('logic_key', logicKeys);
        
    const { data: feedback } = await _supabase.from('daily_feedback')
        .select('status_light')
        .eq('serial_number', currentSerial)
        .eq('record_date', current.record_date)
        .single();

    // 5. 回傳整合後的物件
return { 
        date: current.record_date.replace(/-/g, '/'), 
        battery: currentBattery, 
        percentage: percentage, // 傳回計算出的百分比
        light: feedback?.status_light || '--', 
        bestText: phrases?.find(p => p.logic_key.includes('最佳'))?.detailed_content || "表現不錯！",
        worstText: phrases?.find(p => p.logic_key === `${FIELD_CONFIG[worstKey]}最差`)?.detailed_content || "這部分可留意。",
        raw_json: raw, // <--- 修正：這裡一定要補上逗點
        flowSuggestion: phrases?.find(p => p.logic_key.includes('最差') && p.logic_key.match(/\d$/))?.detailed_content 
    };
}

        .eq('serial_number', currentSerial)
        .order('record_date', { ascending: false })
        .limit(days);

    if (error || !healthData || healthData.length === 0) {
        card.querySelector('.trend-content').innerHTML = error ? "讀取失敗" : "暫無數據 😅";
        return;
    }

    const sortedData = healthData.reverse();
    const dateRange = sortedData.map(d => d.record_date);

    // 2. 抓取個人感受數據 (從兩個表抓)
    const [feedbackRes, surveyRes] = await Promise.all([
        _supabase.from('daily_feedback').select('record_date, raw_json').eq('serial_number', currentSerial).in('record_date', dateRange),
        _supabase.from('user_daily_surveys').select('record_date, subjective_score').eq('serial_number', currentSerial).in('record_date', dateRange)
    ]);

    // 3. 建立日期索引的感受數據地圖 (優先序：daily_feedback > user_daily_surveys)
    const subjectiveMap = {};
    
    // 先塞 survey 的數據 (備案)
    if (surveyRes.data) {
        surveyRes.data.forEach(d => { subjectiveMap[d.record_date] = d.subjective_score; });
    }
    // 再塞 feedback 的數據 (若有則覆蓋，符合優先權)
    if (feedbackRes.data) {
        feedbackRes.data.forEach(d => {
            const val = d.raw_json?.["自評電量"];
            if (val !== undefined && val !== null) {
                subjectiveMap[d.record_date] = Number(val);
            }
        });
    }

    const container = card.querySelector('.trend-content');
    container.innerHTML = ''; 

    const typesToRender = type === 'all' ? ['battery', 'n3', 'rmssd', 'hrmin', 'hbi'] : [type];
    
    for (const t of typesToRender) {
        const chartBox = document.createElement('div');
        chartBox.className = 'chart-item';
        container.appendChild(chartBox);
        // 將 subjectiveMap 傳入
        drawSingleChart(chartBox, t, sortedData, subjectiveMap);
    }
}







function drawSingleChart(container, type, rawData, subjectiveMap = {}) {
    const config = {
        battery: { title: "生理電量", unit: "", field: "Personal_Battery_weighted_round", color: "#596b75", abnormalLabel: "當日數值低於個人平均" },
     
        n3: { title: "N3 深睡比例", unit: "單位：%", field: "N3_pct", color: "#596b75", abnormalLabel: "低於個人平均/參考標準" },
        rmssd: { title: "rMSSD 放鬆恢復", unit: "單位：ms", field: "rMSSD", color: "#596b75", abnormalLabel: "低於個人平均範圍" },
        hrmin: { title: "睡眠最低脈搏", unit: "單位：bpm", field: "HR_min", color: "#596b75", abnormalLabel: "高於個人平均範圍" },
        hbi: { title: "HBI 缺氧負荷", unit: "單位：%min/h", field: "HBI", color: "#596b75", abnormalLabel: "高於個人平均" }
    }[type];

    const labels = rawData.map(d => d.record_date.slice(5).replace('-', '/'));
    const dailyValues = rawData.map(d => Number(d.raw_json[config.field]) || 0);
    const movingAvgs = [];
    const lowerBounds = []; 
    const upperBounds = [];



// 準備個人感受數據
const subjectiveValues = rawData.map(d => subjectiveMap[d.record_date] || null);

    // 計算平均值邏輯 (保持不變)
    dailyValues.forEach((val, i) => {
        const start = Math.max(0, i - 6);
        const chunk = dailyValues.slice(start, i + 1);
        const avg = chunk.reduce((a, b) => a + b, 0) / chunk.length;
        if (type === 'rmssd') {
            movingAvgs.push(avg); lowerBounds.push(avg * 0.9); upperBounds.push(avg * 1.1);
        } else if (type === 'hrmin') {
            movingAvgs.push(avg); lowerBounds.push(avg - 5); upperBounds.push(avg + 5);
        } else {
            movingAvgs.push(type === 'hbi' ? parseFloat(avg.toFixed(1)) : Math.round(avg));
        }
    });

    const pointColors = dailyValues.map((v, i) => {
        const ma = movingAvgs[i];
        if (type === 'battery' && v < ma) return '#ff8c73';
        if (type === 'n3' && (v < ma || v < 10)) return '#ff8c73';
        if (type === 'rmssd' && v < lowerBounds[i]) return '#ff8c73';
        if (type === 'hrmin' && v > upperBounds[i]) return '#ff8c73';
        if (type === 'hbi' && v > ma) return '#ff8c73';
        return config.color;
    });

    // 建立結構：將圖例移至上方
    container.innerHTML = `
        <div class="chart-info-header">
            <div class="chart-title-row">
                <span class="chart-title">${config.title}</span>
                <span class="unit-text">${config.unit}</span>
            </div>
            <div class="chart-legend">${renderLegend(type, config.abnormalLabel)}</div>
        </div>
        <div class="chart-wrapper"><canvas></canvas></div>
     
    `;

    const ctx = container.querySelector('canvas').getContext('2d');
    
    // N3 背景色區塊插件 (只在 N3 圖表執行)
    const n3BackgroundPlugin = {
        id: 'n3Background',
        beforeDraw: (chart) => {
            if (type !== 'n3') return;
            const { ctx, chartArea: { left, top, width, height }, scales: { y } } = chart;
            const yStart = y.getPixelForValue(20);
            const yEnd = y.getPixelForValue(10);
            ctx.save();
            ctx.fillStyle = '#f0f8f9'; // 指定的標準參考範圍底色
            ctx.fillRect(left, yStart, width, yEnd - yStart);
            ctx.restore();
        }
    };

    const datasets = [
        {
            label: '當日數值',             
            type: 'line',
            data: dailyValues,
            borderColor: '#999999',
            borderWidth: 1.5,
            pointBackgroundColor: pointColors,
            pointRadius: 4,
            pointBorderWidth: 0, // Point 2: 圓點不要有外框
            zIndex: 10
        }
    ];


// 如果是生理電量，新增一條「個人感受」曲線
    if (type === 'battery') {
        datasets.push({
            label: '體感數值',
            type: 'line',
            data: subjectiveValues,
            borderColor: '#a79d8c', // 大地色/褐色
            borderWidth: 2,
            borderDash: [5, 3], // 虛線區分
            pointBackgroundColor: '#a79d8c',
            pointRadius: 3,
            spanGaps: true, // 沒填問卷時連起來
            zIndex: 5
        });
    }




    if (type === 'rmssd' || type === 'hrmin') {
        datasets.push({
            type: 'bar',
            data: rawData.map((_, i) => [lowerBounds[i], upperBounds[i]]),
            backgroundColor: '#c1cdd3',
            barPercentage: 0.5
        });
    } else {
        datasets.push({
            type: 'bar',
            data: movingAvgs,
            backgroundColor: '#c1cdd3',
            barPercentage: 0.5
        });
    }

    new Chart(ctx, {
        plugins: [n3BackgroundPlugin],
        data: { labels, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            layout: { padding: { right: 10 } }, // 確保右側不貼邊
            plugins: { legend: { display: false } },
            scales: {
                y: { 
                    afterFit: (scale) => { scale.width = 45; }, // 固定 Y 軸寬度以便與下方 Tag 對齊
                    beginAtZero: type !== 'hrmin',
                    grid: { color: '#f2f2f2' },
                    ticks: { font: { size: 11 }, color: '#888' }
                },
                x: { 
                    grid: { display: false },
                    ticks: { font: { size: 11 }, color: '#888' }
                }
            }
        }
    });
}

function renderLegend(type, abnormalLabel) {
    const isRange = (type === 'rmssd' || type === 'hrmin');
    let html = `
        <div class="legend-row"><div class="dot-sample" style="background:#596b75"></div> 當日數值</div>
        <div class="legend-row"><div class="bar-sample" style="background:#c1cdd3"></div> 7日平均${isRange?'範圍':''}</div>
    `;


// 生理電量特有圖例
    if (type === 'battery') {
        html += `<div class="legend-row"><div class="dot-sample" style="background:#a79d8c; border-radius:0; height:2px; width:12px; margin-top:5px"></div> 體感數值</div>`;
    }


    if (type === 'n3') {
        html += `<div class="legend-row"><div class="bar-sample" style="background:#f0f8f9; border:1px solid #ddd"></div> 參考標準 (10-20)</div>`;
    }
    html += `<div class="legend-row"><div class="dot-sample" style="background:#ff8c73"></div> ${abnormalLabel}</div>`;
    return html;
}

   function appendBalanceCard(data) {
        const raw = data.raw_json;
        const indicators = [
            { label: '修復時間', val: raw.Battery_TST_min_A || 0 },
            { label: '核心修復', val: raw.Battery_N3_pct_A || 0 },
            { label: '放鬆指數', val: raw.Battery_rMSSD_A || 0 },
            { label: '脈搏穩定度', val: raw.Battery_HR_min_A || 0 },
            { label: '血氧穩定度', val: raw.Battery_HBI_A || 0 },
            { label: '睡眠連續性', val: raw.Battery_wake_minutes_A || 0 },
            { label: '睡眠規律性', val: raw.Battery_OnsetDev_min_A || 0 }
        ];

        const lowCount = indicators.filter(i => i.val < 60).length;
        const resultText = lowCount > 3 ? "低平衡度" : indicators.every(i => i.val >= 60) ? "高平衡度" : "中平衡度";
        
        const centerX = 230;
        const centerY = 230;
        const radiusMin = 55; 
        const radiusMid = 115; 
        const radiusMax = 180;

        const points = indicators.map((ind, i) => {
            const angle = (Math.PI * 2 * i / 7) - (Math.PI / 2);
            let r;
            if (ind.val < 60) {
                r = radiusMin + (ind.val / 60) * (radiusMid - radiusMin);
            } else {
                r = radiusMid + ((Math.min(ind.val, 100) - 60) / 40) * (radiusMax - radiusMid);
            }

            const color = ind.val >= 95 ? "#596b75" : ind.val >= 80 ? "#8699a3" : ind.val >= 60 ? "#a79d8c" : "#ff8c73";
            const labelDist = radiusMax + 55; // 再往外推一點點
            
            return { 
                x: centerX + r * Math.cos(angle), 
                y: centerY + r * Math.sin(angle), 
                color, 
                labelX: centerX + labelDist * Math.cos(angle), 
                labelY: centerY + (labelDist - 5) * Math.sin(angle) 
            };
        });

        const cardHtml = `
            <div class="msg-row ai-row">
                <div class="balance-card" onclick="zoomChart(this)">
                    <div class="summary-header"><span>📅 ${data.record_date.replace(/-/g, '/')} 生理電量平衡度</span></div>
                    <svg viewBox="-70 -55 600 550" class="radar-svg" style="width: 100%; height: auto; display: block;">
                        <circle cx="${centerX}" cy="${centerY}" r="${radiusMax}" fill="#f2f2f2" />
                        <circle cx="${centerX}" cy="${centerY}" r="${radiusMid}" fill="#e6e6e6" />
                        <circle cx="${centerX}" cy="${centerY}" r="${radiusMin}" fill="white" />
                        
                        ${indicators.map((_, i) => {
                            const angle = (Math.PI * 2 * i / 7) - (Math.PI / 2);
                            return `<line x1="${centerX + radiusMin * Math.cos(angle)}" y1="${centerY + radiusMin * Math.sin(angle)}" 
                                          x2="${centerX + radiusMax * Math.cos(angle)}" y2="${centerY + radiusMax * Math.sin(angle)}" 
                                          stroke="white" stroke-width="1.5" />`;
                        }).join('')}
                        
                        ${points.map((p, i) => `
                            <circle cx="${p.x}" cy="${p.y}" r="7" fill="${p.color}" stroke="white" stroke-width="1.5" />
                            <text x="${p.labelX}" y="${p.labelY}" class="radar-label" 
                                  text-anchor="middle" dominant-baseline="middle" 
                                  style="font-size: 17px; font-weight: 600; fill: #555;">${indicators[i].label}</text>
                        `).join('')}
                        
                        <text x="${centerX}" y="${centerY + 5}" class="radar-result-text" text-anchor="middle" style="font-size: 22px; font-weight: bold; fill: #444;">${resultText}</text>
                    </svg>

                    <div class="balance-description">
                        綜合修復時間、核心修復、放鬆指數、脈搏穩定度、血氧穩定度、睡眠連續性、睡眠規律性，七大項指標評估當天的生理平衡狀態。
                    </div>
                </div>
            </div>`;
        document.getElementById('chat-history').innerHTML += cardHtml; 
        scrollToBottom();
    }



    // 其他輔助函數
    async function processBalanceSearch(d) { document.querySelector('.date-actions')?.remove(); await appendAiMessage(`正在查詢 ${d} 生理電量平衡度...`); const { data } = await _supabase.from('health_data').select('record_date, raw_json').eq('serial_number', currentSerial).eq('record_date', d).single(); if (data) { appendBalanceCard(data); await new Promise(r => setTimeout(r, 600)); await appendAiMessage(getRandomEndQuestion());
} else await appendAiMessage("這天沒數據喔~ 😅 可能是沒有上傳，或資料尚未同步完成。 ☁️"); }

            // B. 如果沒紀錄或未同意，顯示詢問介面
            appendAiMessage("這超出了我的基礎功能。您是否同意讓 Soosyn AI (Gemini) 搜尋網路或資料庫來回答您的問題？(此操作會將您的健康資訊傳送至 AI 處理)");
            
            // 動態產生同意/不同意按鈕
            const chatHistory = document.getElementById('chat-history');
            const btnContainerId = 'consent-btns-' + Date.now();
            chatHistory.innerHTML += `
                <div class="msg-row ai-row" id="${btnContainerId}">
                    <div style="margin-left: 45px; display: flex; gap: 10px;">
                        <button onclick="saveConsent('${userInput}', true, '${btnContainerId}')" style="background:#8699a3; color:white; border:none; 
font-size: 14px; padding:10px 18px; border-radius:10px; cursor:pointer;">同意並查詢</button>
                        <button onclick="saveConsent('', false, '${btnContainerId}')" style="background:#a79d8c; color:white; border:none; 
font-size: 14px; padding:10px 18px; border-radius:10px; cursor:pointer;">不同意</button>
                    </div>
                </div>
            `;
            scrollToBottom();
        }
    } catch (err) {
        console.error("Consent check error:", err);
    }
}

// --- 2. 儲存同意結果並執行 ---
async function saveConsent(originalPrompt, agreed, btnId) {
    // 隱藏按鈕避免重複點擊
    const btnElem = document.getElementById(btnId);
    if (btnElem) btnElem.remove();

    if (agreed) {
        // 寫入 Supabase 新表
        await _supabase.from('user_ai_permissions').upsert({
            serial_number: currentSerial,
            is_agreed: true,
            agreed_at: new Date()
        });

        appendAiMessage("感謝您的同意，正在為您尋找答案...");
        const response = await callGeminiAPI(originalPrompt);
        appendAiMessage(response);
    } else {
        appendAiMessage("好的，我將不會使用 AI 處理此問題。");
    }
}

// --- 修正後的呼叫 Gemini API 函式 ---
let chatHistory = [];

async function callGeminiAPI(prompt) {
    const typingId = 'typing-' + Date.now();
    const historyElem = document.getElementById('chat-history'); // 確保變數名稱統一
    
    // 1. 顯示打字動畫 (修正變數名稱，並改用 insertAdjacentHTML 確保穩定性)
    if (historyElem) {
        historyElem.insertAdjacentHTML('beforeend', `
            <div class="msg-row ai-row" id="${typingId}">
                <div class="ai-bubble">
                    <div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    <small style="color: #888; display: block; margin-top: 5px;">正在分析你的健康數據...</small>
                </div>
            </div>
        `);
    }
    scrollToBottom();

    // 取得當前訊息中提到的日期
    const targetDateStr = getTargetDate(prompt); 

    try {
        const res = await fetch('/api/gemini', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                prompt: prompt,
                serial_number: currentSerial,
                record_date: targetDateStr,
                history: chatHistory // 重要：要把對話紀錄傳給後端，記憶功能才會動！
            })
        });
        const data = await res.json();

        // 2. 記憶功能：更新對話紀錄
        chatHistory.push({ role: "user", parts: [{ text: prompt }] });
        chatHistory.push({ role: "model", parts: [{ text: data.text }] });

        // 限制紀錄長度 (例如只留最近 10 次對話)
        if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);

        // 3. 移除動畫
        const typingElem = document.getElementById(typingId);
        if (typingElem) typingElem.remove();

        return data.text;
    } catch (err) {
        console.error("API Error:", err);
        const typingElem = document.getElementById(typingId);
        if (typingElem) typingElem.remove();
        return "抱歉，我現在連不上線，請稍後再試。 😅";
    }
}
