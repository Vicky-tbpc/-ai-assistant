name: Scheduled API Reminders

on:
  schedule:
    - cron: '5 1 * * *'   # 早上 09:05 台北
    - cron: '35 12 * * *' # 晚上 20:35 台北
  workflow_dispatch:
    inputs:
      trigger_type:
        description: '請選擇要手動觸發的 API'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - sleep
          - both

jobs:
  trigger-api:
    runs-on: ubuntu-latest
    steps:
      # 觸發 Daily Reminder 的條件：如果是定時(01:05) 或者 手動選了 daily/both
      - name: Trigger Daily Reminder (Morning)
        if: github.event.schedule == '5 1 * * *' || github.event.inputs.trigger_type == 'daily' || github.event.inputs.trigger_type == 'both'
        run: |
          curl -X GET "https://ai-assistant-eight-puce.vercel.app/api/daily-reminder" \
          -H "Content-Type: application/json"

      # 觸發 Sleep Reminder 的條件：如果是定時(12:35) 或者 手動選了 sleep/both
      - name: Trigger Sleep Reminder (Night)
        if: github.event.schedule == '35 12 * * *' || github.event.inputs.trigger_type == 'sleep' || github.event.inputs.trigger_type == 'both'
        run: |
          curl -X GET "https://ai-assistant-eight-puce.vercel.app/api/sleep-reminder" \
          -H "Content-Type: application/json"
